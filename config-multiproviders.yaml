# Nahida Bot 配置文件
# 参见 nahida_bot.core.config.Settings 了解所有可用字段

# ── 应用 ──────────────────────────────────────────────
app_name: "Nahida Bot"
debug: false
log_level: "INFO"        # DEBUG / INFO / WARNING / ERROR
# log_json: true          # 设为 true 输出 JSON 格式日志（生产环境推荐）

# ── 服务器 ────────────────────────────────────────────
host: "127.0.0.1"
port: 6185

# ── 数据库 ────────────────────────────────────────────
db_path: "./data/nahida.db"

# ── Workspace ─────────────────────────────────────────
workspace_base_dir: "./data/workspace"

# ── 插件 ──────────────────────────────────────────────
plugin_paths:
  - "./plugins"

# ── Agent / Router ────────────────────────────────────
system_prompt: "You are a helpful assistant."

# ── LLM Providers（dict 格式，key 即 provider id）───
# 支持多 provider 配置，每个 provider 有独立的 api_key 和 models 列表。
# models 的第一个元素是该 provider 的默认模型；每个模型可以是字符串，
# 也可以是 {name, capabilities} 对象。通过 /model 命令可在聊天中切换模型。
#
providers:
  deepseek-main:
    type: deepseek
    api_key: "${DEEPSEEK_LLM_API_KEY}"
    base_url: "${DEEPSEEK_LLM_BASE_URL}"
    models: ["deepseek-v4-pro", "deepseek-v4-flash"]
  siliconflow:
    type: "openai-compatible"
    api_key: "${SILICONFLOW_LLM_API_KEY}"
    base_url: "${SILICONFLOW_LLM_BASE_URL}"
    merge_system_messages: true
    models:
      - "Pro/zai-org/GLM-5"
      - name: "Qwen/Qwen3.6-35B-A3B"
        capabilities:
          image_input: true
          max_image_count: 4
          max_image_bytes: 10485760
  minimax:
    type: minimax
    api_key: "${MINIMAX_LLM_API_KEY}"
    base_url: "https://api.minimaxi.com/anthropic"
    models: ["MiniMax-M2.5", "MiniMax-M2.7"]

  # OpenAI Responses API（可选）
  # 使用 /responses 端点，支持内置工具（web_search、image_generation 等）
  # 和有状态对话链（previous_response_id）。Reasoning 摘要可通过
  # reasoning_effort 参数控制深度。
  #
  openai:
    type: "openai-responses"
    api_key: "${OPENAI_API_KEY}"
    base_url: "${OPENAI_API_BASE_URL}"
    store_responses: true
    use_previous_response_id: false
    stream_responses: true
    reasoning_effort: "medium"
    # built_in_tools: ["web_search", "image_generation"]
    models:
      - name: "gpt-5.4"
        capabilities:
          image_input: true
          image_generation: true
          web_search: true
          tool_calling: true
          reasoning: true

default_provider: deepseek-main   # 可选，默认使用第一个 key

# ── 多模态 / 图片理解 ─────────────────────────────────
# image_fallback_mode:
#   auto: 主模型不支持 image_input 时，自动调用 fallback vision 模型生成描述
#   tool: 主模型不支持 image_input 时，注入 image_understand 工具，由主模型按需调用
#   off:  不处理图片，只保留普通文本
# media_context_policy:
#   cache_aware: 最近图片尽量保留原生内容块，旧图片降级为描述
#   native_recent: 仅最近图片保留原生内容块
#   description_only: 历史图片只使用描述
multimodal:
  image_fallback_mode: "auto"
  media_context_policy: "cache_aware"
  image_fallback_provider: "siliconflow"
  image_fallback_model: "Qwen/Qwen3.6-35B-A3B"
  max_images_per_turn: 4
  max_image_bytes: 10485760
  media_cache_ttl_seconds: 3600

# ── 插件配置 ──────────────────────────────────────────
# Settings 的 extra="allow" 机制：顶层 key 如果不是已知字段，
# 且值为 dict，则按 plugin id 匹配并注入到对应插件的 manifest.config 中。

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  # proxy: "${TELEGRAM_PROXY:}"     # SOCKS5/HTTP 代理，如 socks5://127.0.0.1:1080
  # polling_timeout: 30
  # allowed_chats: []

