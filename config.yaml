# ── Agent Loop ──────────────────────────────────────────
# 控制 Agent 循环的行为：迭代轮数、超时、重试策略等。
# 以下均为默认值，不写则使用默认值。
#
# agent:
#   max_steps: 8                        # 最大工具调用迭代轮数
#   provider_timeout_seconds: 30.0      # 单次 LLM 调用超时（秒）
#   retry_attempts: 2                   # LLM 调用重试次数
#   retry_backoff_seconds: 0.2          # 重试退避间隔（秒）
#   tool_timeout_seconds: 135.0         # 工具执行超时（秒）
#   tool_retry_attempts: 1              # 工具执行重试次数
#   tool_retry_backoff_seconds: 0.1     # 工具重试退避间隔（秒）
#   max_tool_log_chars: 400             # 工具日志截断长度
#   # tool_use_system_prompt: "..."     # 注入的工具使用提示
#   # provider_error_template: "..."    # Provider 错误消息模板

# ── Context Budget ──────────────────────────────────────
# 控制上下文窗口大小和 reasoning chain 预算。
# 以下均为默认值，不写则使用默认值。
#
# context:
#   max_tokens: 8000                    # 最大 token 预算
#   reserved_tokens: 1000               # 为输出保留的 token
#   # max_chars: null                   # 字符数上限（兼容旧逻辑，优先使用 max_tokens）
#   # reserved_chars: 0                 # 字符保留数
#   summary_max_chars: 600              # 历史摘要最大字符数
#   reasoning_policy: "budget"          # strip / append / budget
#   max_reasoning_tokens: 2000          # reasoning chain token 预算

# ── Scheduler ──────────────────────────────────────────
# 控制定时任务调度行为。
# 以下均为默认值，不写则使用默认值。
#
# scheduler:
#   poll_interval_seconds: 1.0          # 调度轮询间隔（秒）
#   max_concurrent_fires: 5             # 最大并发执行数
#   job_timeout_seconds: 120.0          # 单任务超时（秒）
#   min_interval_seconds: 60            # cron 最小间隔（秒）
#   max_prompt_chars: 4000              # 定时任务 prompt 最大字符数
#   max_jobs_per_chat: 20               # 每个会话最大任务数
#   failure_retry_seconds: 300          # 失败重试等待（秒）
#   max_consecutive_failures: 3         # 连续失败上限
#   memory_dreaming_enabled: true       # 是否启用内部记忆 dreaming
#   memory_dreaming_interval_seconds: 3600       # dreaming 周期（秒）
#   memory_dreaming_initial_delay_seconds: 300   # 启动后首次 dreaming 延迟（秒）
#   memory_dreaming_session_limit: 20            # 单次最多扫描会话数
#   memory_dreaming_recent_turn_limit: 40        # 单会话最多读取 turns 数
#   memory_dreaming_provider_id: ""     # Legacy；建议改用 memory_dreaming_model
#   memory_dreaming_model: ""           # model spec；空则默认找 memory tag，失败后走会话模型

# ── Model Tags / Specs ─────────────────────────────────
# providers 的 models 中可以用 tags 字段标记模型角色。
# 需要内部模型的配置项都接受一个 model spec 字符串；这个字符串可以是 tag，
# 也可以是 provider/model 或裸模型名。
#   models:
#     - name: deepseek-chat
#       tags: [primary]          # 主对话模型（隐式：每个 provider 的第一个模型）
#     - name: deepseek-chat-lite
#       tags: [cheap, memory]    # 低成本后台任务 / 记忆 dreaming
#
# 可用 tags: primary / cheap / memory / embedding / reranker / vision

# ── Memory ─────────────────────────────────────────────
# 长期记忆检索和 embedding 配置。默认只启用 SQLite FTS；vector/hybrid
# 需要显式开启，并在 providers.models 中配置带 embedding tag 的模型。
#
# memory:
#   enabled: true
#   retrieval:
#     fts_enabled: true
#     vector_enabled: false       # 开启后对长期记忆使用 hybrid 检索
#     hybrid_enabled: true
#     vector_backend: json        # json / sqlite-vec / none
#     max_injected_items: 5
#     max_injected_chars: 1200
#   embedding:
#     enabled: false
#     model: ""                   # model spec；空则默认找 embedding tag
#     dimensions: 0               # 0 = auto-detect via probe embed call
#     batch_size: 16
#     embed_after_consolidation: true
#   consolidation:
#     rule_based_enabled: true     # 是否启用每轮对话后的规则抽取；false 时只保留 dreaming/显式写入

# ── Router ─────────────────────────────────────────────
# 控制消息路由行为。system_prompt 使用顶层 system_prompt 字段。
# 以下均为默认值，不写则使用默认值。
#
# router:
#   # system_prompt: "..."              # 与顶层 system_prompt 重复，优先使用顶层字段
#   max_history_turns: 50               # 最大历史轮数
#   agent_enabled: true                 # 是否启用 Agent
#   command_timeout_seconds: 30.0       # 命令执行超时（秒）
#   command_timeout_message: "Command timed out. Please try again later."
#   group_context:
#     enabled: true                     # 是否在触发时注入 observed-only 群上下文
#     max_messages: 20                  # 最多注入最近多少条未触发群消息
#     ttl_seconds: 900                  # 只注入最近 N 秒内的群上下文；0 表示不按时间过滤
#     max_chars: 4000                   # 群上下文注入块最大字符数
