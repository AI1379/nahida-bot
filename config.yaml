# Nahida Bot 配置文件
# 参见 nahida_bot.core.config.Settings 了解所有可用字段

# ── 应用 ──────────────────────────────────────────────
app_name: "Nahida Bot"
debug: false
log_level: "INFO"        # DEBUG / INFO / WARNING / ERROR
# log_json: true          # 设为 true 输出 JSON 格式日志（生产环境推荐）

# ── 服务器 ────────────────────────────────────────────
host: "127.0.0.1"
port: 6185

# ── 数据库 ────────────────────────────────────────────
db_path: "./data/nahida.db"

# ── Workspace ─────────────────────────────────────────
workspace_base_dir: "./data/workspace"

# ── 插件 ──────────────────────────────────────────────
plugin_paths:
  - "./plugins"

# ── Agent / Router ────────────────────────────────────
system_prompt: "You are a helpful assistant."

# ── LLM Providers（dict 格式，key 即 provider id）───
# 支持多 provider 配置，每个 provider 有独立的 api_key 和 models 列表。
# models 的第一个元素是该 provider 的默认模型；每个模型可以是字符串，
# 也可以是 {name, capabilities} 对象。通过 /model 命令可在聊天中切换模型。
#
# providers:
#   deepseek-main:
#     type: deepseek
#     api_key: "${DEEPSEEK_API_KEY}"
#     models: ["deepseek-chat", "deepseek-reasoner"]
#   glm:
#     type: glm
#     api_key: "${GLM_API_KEY}"
#     models: ["glm-4-flash", "glm-4-plus"]
#   vision:
#     type: openai-compatible
#     api_key: "${VISION_API_KEY}"
#     base_url: "${VISION_BASE_URL}"
#     models:
#       - name: "vision-model"
#         capabilities:
#           image_input: true
#           max_image_count: 4
#
# default_provider: deepseek-main   # 可选，默认使用第一个 key

providers:
  default:
    type: "openai-compatible"
    api_key: "${LLM_API_KEY}"
    base_url: "${LLM_BASE_URL}"
    models:
      - "${LLM_MODEL}"

default_provider: default

# ── 多模态 / 图片理解 ─────────────────────────────────
# 主模型有 models[].capabilities.image_input=true 时会直接传图；
# 主模型没有 image_input 时，按 image_fallback_mode 决定是否调用 fallback vision。
multimodal:
  image_fallback_mode: "auto"        # auto / tool / off
  media_context_policy: "cache_aware" # cache_aware / native_recent / description_only
  image_fallback_provider: ""        # 例如 "vision"
  image_fallback_model: ""           # 例如 "vision-model"
  max_images_per_turn: 4
  max_image_bytes: 10485760
  media_cache_ttl_seconds: 3600

# ── 插件配置 ──────────────────────────────────────────
# Settings 的 extra="allow" 机制：顶层 key 如果不是已知字段，
# 且值为 dict，则按 plugin id 匹配并注入到对应插件的 manifest.config 中。

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  # proxy: "${TELEGRAM_PROXY:}"     # SOCKS5/HTTP 代理，如 socks5://127.0.0.1:1080
  # polling_timeout: 30
  # allowed_chats: []

