id: builtin-commands
name: "Builtin Commands"
version: "0.1.0"
description: "Core commands, workspace tools, exec, web fetch, and plan management"
type: tool
entrypoint: "nahida_bot.plugins.builtin.commands:BuiltinCommandsPlugin"
permissions:
  filesystem:
    read:
      - workspace
    write:
      - workspace
  network:
    outbound:
      - "*"
  system:
    subprocess: true
capabilities:
  tools:
    - name: workspace_read
      description: Read a text file from the active workspace
    - name: workspace_write
      description: Write a text file to the active workspace
    - name: exec
      description: Execute a shell command and return stdout/stderr
    - name: web_fetch
      description: Fetch a web page and return its content as Markdown
    - name: plan
      description: Create and manage task plans for structured work
