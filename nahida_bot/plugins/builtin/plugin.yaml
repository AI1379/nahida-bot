id: builtin-commands
name: "Builtin Commands"
version: "0.1.0"
description: "Core commands, workspace tools, exec, web fetch, plan, cron, and agent orchestration"
entrypoint: "nahida_bot.plugins.builtin.commands:BuiltinCommandsPlugin"
permissions:
  filesystem:
    read:
      - workspace
    write:
      - workspace
  network:
    outbound:
      - "*"
  system:
    subprocess: true
  memory:
    read: true
    write: true
capabilities:
  tools:
    - name: workspace_read
      description: Read a text file from the active workspace
    - name: workspace_write
      description: Write a text file to the active workspace
    - name: memory_read
      description: Read workspace Markdown memory
    - name: memory_write
      description: Append workspace Markdown memory
    - name: exec
      description: Execute a shell command and return stdout/stderr
    - name: web_fetch
      description: Fetch a web page and return its content as Markdown
    - name: plan
      description: Create and manage task plans for structured work
    - name: agent_spawn
      description: Start a local background subagent task
    - name: agent_wait
      description: Wait for a subagent task result
    - name: agent_yield
      description: Yield to a subagent task result
    - name: agent_list
      description: List subagent tasks for the current session
    - name: agent_stop
      description: Cancel a subagent task
