id: telegram
name: "Telegram Channel"
version: "0.1.0"
description: "Telegram Bot channel via aiogram"
entrypoint: "nahida_bot.channels.telegram.plugin:TelegramPlugin"

permissions:
  network:
    outbound:
      - "api.telegram.org"
    inbound: false

config:
  group_trigger_mode: "always"
  group_context_capture: false
